name: Publish public branch to public repository
on:
  push:
    branches:
      - public
jobs:
  job:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            public-env
            private-env
          permission-contents: write
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Add public repository origin
        run: |
          git remote add public https://github.com/appare45/public-env.git
          git remote add private https://github.com/appare45/private-env.git
      - name: Push to public repository
        if: github.repository == 'appare45/private-env'
        run: |
          git pull public
          git push -u public public
      - name: Push to private repository
        if: github.repository == 'appare45/public-env'
        run: |
          git pull private
          git push -u private public
