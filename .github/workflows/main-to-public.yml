name: Publish public branch to public repository
on:
  push:
    branches:
      - public
jobs:
  job:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - name: Set for gh
        run: |
          echo ${{ steps.app-token.outputs.token }} | gh auth login --with-token
      - name: Add public repository origin
        run: |
          git remote add public https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/appare45/env.git
      - name: Push public branch to public repository
        run: |
          git push -u public public
